<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#7A5535"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GP Foto"/>
<title>Giovana Petronilho Fotografia</title>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;width:100%}
body{height:100%;width:100%;background:#FAF7F4;font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
#root{height:100%;display:flex;flex-direction:column}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
a{-webkit-tap-highlight-color:transparent}

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef} = React;

/* ── PALETTE ── */
const C={
  br:"#A67C52",brd:"#7A5535",brl:"#C4A882",brxl:"#E8D9C8",
  cream:"#FAF7F4",bg:"#F0E9E1",bgm:"#DDD0C0",
  tx:"#2E1D0E",txm:"#8A6E58",txl:"#B8A090",
  wh:"#FFFFFF",ok:"#5E9E6A",warn:"#C4923A",err:"#B55B5B",info:"#5B7FA6",
  ov:"rgba(25,12,4,.6)",pu:"#9E6BA0",
};

/* ── CONSTANTS ── */
const SESSION_TYPES=["Casamento","Estúdio","Aniversário","Pré-Wedding","Externo","Newborn","Debutante","Gestante","Família","Corporativo"];
const WEDDING_SVCS=["Cerimônia","Recepção","Making Off","Álbum","Pré-Wedding","Festa","Ensaio de Casal","Trash the Dress","Daminhas/Pajens"];
const COST_CATS=["Deslocamento","Aluguel de Espaço","Água e Luz","Cenário/Montagem","Assistente/2º Fotógrafo","Figurino","Maquiagem","Equipamento","Alimentação","Impressão/Álbum","Marketing","Outro"];
const MONTHS=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const TCOLOR={"Casamento":"#7A5535","Pré-Wedding":"#9E6BA0","Estúdio":"#A67C52","Aniversário":"#C4923A","Externo":"#5B7FA6","Newborn":"#5E9E6A","Debutante":"#B07AB0","Gestante":"#5B8FA0","Família":"#C4923A","Corporativo":"#5B8FA0"};
const AGCOLOR={"Casamento":"#7A5535","Newborn":"#5E9E6A","Debutante":"#9E6BA0","Gestante":"#5B7FA6","Família":"#C4923A","Reunião":"#8A6E58","Entrega":"#A67C52","Ensaio":"#C4A882","Making Off":"#7A5535","Cerimônia":"#7A5535","Recepção":"#C4923A"};

/* ── STORAGE ── */
const SK={cl:'gp_clients_v4',ag:'gp_agenda_v4'};
const load=(k,fb)=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch(e){return fb;}};
const save=(k,d)=>{try{localStorage.setItem(k,JSON.stringify(d));}catch(e){}};

/* ── SEED DATA ── */
const SEED_CL=[
  {id:1,name:"Ana Luiza Ferreira",city:"Caxambu",phone:"(35) 99812-3456",email:"analuiza@email.com",
   sessionType:"Casamento",weddingServices:["Cerimônia","Recepção","Making Off"],
   paymentMode:"pacote",totalPhotos:800,deliveredPhotos:800,pendingPhotos:0,pricePerPhoto:0,
   totalValue:4800,status:"entregue",sessionDate:"2026-03-15",notes:"Casamento no haras.",avatar:"AL",
   costs:[{id:11,cat:"Deslocamento",desc:"Haras 40km",value:120},{id:12,cat:"Assistente/2º Fotógrafo",desc:"Bruno",value:350}],
   payments:[{id:101,date:"2026-02-01",value:2400,note:"Sinal 50%"},{id:102,date:"2026-03-16",value:2400,note:"Restante"}],
   services:[]},
  {id:2,name:"Camila Rocha Santos",city:"Baependi",phone:"(35) 99734-5678",email:"camila.rocha@email.com",
   sessionType:"Newborn",weddingServices:[],
   paymentMode:"pacote",totalPhotos:120,deliveredPhotos:0,pendingPhotos:120,pricePerPhoto:0,
   totalValue:1200,status:"pendente",sessionDate:"2026-06-20",notes:"Edição em andamento.",avatar:"CR",
   costs:[{id:21,cat:"Cenário/Montagem",desc:"Props newborn",value:90}],
   payments:[{id:201,date:"2026-05-15",value:600,note:"Entrada 50%"}],
   services:[]},
];
const SEED_AG=[
  {id:1,clientId:2,date:"2026-06-25",time:"09:00",type:"Newborn",location:"Estúdio GP",status:"confirmado",notes:"Trazer roupinhas neutras."},
  {id:2,clientId:1,date:"2026-07-10",time:"14:00",type:"Reunião",location:"Estúdio GP",status:"confirmado",notes:""},
];

/* ── HELPERS ── */
const fmt=v=>`R$\u00a0${Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})}`;
const fmtD=d=>{try{return new Date(d+"T12:00:00").toLocaleDateString("pt-BR");}catch(e){return d||"";}};
const mLabel=d=>{try{const[y,m]=d.split("-");return`${MONTHS[parseInt(m)-1]} ${y}`;}catch(e){return d;}};
const paidOf=c=>(c.payments||[]).reduce((s,p)=>s+p.value,0);
const costsOf=c=>(c.costs||[]).reduce((s,x)=>s+x.value,0);
const effVal=c=>c.paymentMode==="por_foto"?(c.deliveredPhotos||0)*(c.pricePerPhoto||0):(c.totalValue||0);
const initials=name=>{const w=(name||"").trim().split(/\s+/);return((w[0]?.[0]||"")+(w[1]?.[0]||"")).toUpperCase()||"?";};

/* ── ICONS ── */
const Ic=({n,s=20,c="currentColor"})=>{
  const d={
    home:<><rect x="3" y="10" width="18" height="11" rx="1"/><polyline points="3 10 12 3 21 10"/></>,
    users:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    cal:<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    img:<><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
    wallet:<><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></>,
    chart:<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
    plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    x:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></>,
    cam:<><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>,
    up:<><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></>,
    search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    phone:<><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></>,
    mail:<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,
    pin:<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>,
    money:<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
    tag:<><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></>,
    layers:<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>,
    check:<><polyline points="20 6 9 17 4 12"/></>,
  };
  return <svg width={s} height={s} fill="none" stroke={c} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">{d[n]}</svg>;
};

/* ── MICRO COMPONENTS ── */
const Av=({name,size=40})=>(
  <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,
    background:`linear-gradient(135deg,${C.brl},${C.brd})`,
    display:"flex",alignItems:"center",justifyContent:"center",
    color:C.wh,fontWeight:700,fontSize:size*.34,letterSpacing:.5}}>
    {initials(name)}
  </div>
);

const Bdg=({status})=>{
  const M={entregue:{bg:"#E5F4E9",c:C.ok,l:"Entregue"},pendente:{bg:"#FDF0DE",c:C.warn,l:"Pendente"},
    parcial:{bg:"#E6EFF9",c:C.info,l:"Parcial"},confirmado:{bg:"#E5F4E9",c:C.ok,l:"Confirmado"},
    disponivel:{bg:C.bg,c:C.txm,l:"Disponível"},quitado:{bg:"#E5F4E9",c:C.ok,l:"✓ Quitado"}};
  const s=M[status]||M.pendente;
  return <span style={{background:s.bg,color:s.c,borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>{s.l}</span>;
};

const Bar=({value,max,color=C.br,h=6})=>{
  const pct=max?Math.min(100,Math.round(value/max*100)):0;
  return <div style={{background:C.bg,borderRadius:6,height:h,overflow:"hidden",marginTop:5}}>
    <div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:6,transition:"width .3s"}}/>
  </div>;
};

/* ── BOTTOM SHEET ── */
const Sheet=({title,onClose,children})=>{
  useEffect(()=>{
    const prev=document.body.style.overflow;
    document.body.style.overflow="hidden";
    return()=>{document.body.style.overflow=prev;};
  },[]);
  return (
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div style={{position:"absolute",inset:0,background:C.ov}} onClick={onClose}/>
      <div style={{position:"relative",background:C.wh,borderRadius:"20px 20px 0 0",
        maxHeight:"90vh",display:"flex",flexDirection:"column",
        boxShadow:"0 -8px 40px rgba(30,12,4,.25)",
        paddingBottom:"env(safe-area-inset-bottom,16px)"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px",flexShrink:0}}>
          <div style={{width:36,height:4,borderRadius:2,background:C.bgm}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 20px 12px",flexShrink:0,borderBottom:`1px solid ${C.bg}`}}>
          <span style={{fontFamily:"Georgia,serif",fontSize:17,fontWeight:700,color:C.tx}}>{title}</span>
          <button onClick={onClose} style={{background:C.bg,border:"none",borderRadius:50,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <Ic n="x" s={16} c={C.txm}/>
          </button>
        </div>
        <div style={{overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"16px 20px 8px",flex:1}}>
          {children}
        </div>
      </div>
    </div>
  );
};

/* ── PAGE HEADER ── */
const PH=({title,sub,action})=>(
  <div style={{background:C.cream,padding:"14px 20px 10px",borderBottom:`1px solid ${C.bg}`,flexShrink:0}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,color:C.tx,lineHeight:1.1}}>{title}</div>
        {sub&&<div style={{fontSize:12,color:C.txm,marginTop:2}}>{sub}</div>}
      </div>
      {action}
    </div>
  </div>
);

/* ── ADD BUTTON ── */
const AddB=({onClick})=>(
  <button onClick={onClick} style={{width:38,height:38,borderRadius:12,
    background:`linear-gradient(135deg,${C.br},${C.brd})`,border:"none",
    display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",
    boxShadow:`0 3px 10px ${C.br}44`}}>
    <Ic n="plus" s={18} c={C.wh}/>
  </button>
);

/* ── BUTTON ── */
const Btn=({children,onClick,v="primary",full,sm,icon,style:sx={}})=>{
  const vs={
    primary:{background:`linear-gradient(135deg,${C.br},${C.brd})`,color:C.wh,border:"none",boxShadow:`0 3px 12px ${C.br}44`},
    secondary:{background:C.wh,color:C.br,border:`1.5px solid ${C.br}`},
    ghost:{background:C.bg,color:C.tx,border:"none"},
    danger:{background:C.err,color:C.wh,border:"none"},
    soft:{background:`${C.br}18`,color:C.br,border:"none"},
    purple:{background:C.pu,color:C.wh,border:"none"},
  };
  return <button onClick={onClick} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,
    borderRadius:12,padding:sm?"8px 14px":"13px 20px",fontSize:sm?12:14,fontWeight:700,cursor:"pointer",
    width:full?"100%":undefined,...vs[v],...sx}}>
    {icon&&<Ic n={icon} s={sm?13:15} c="currentColor"/>}{children}
  </button>;
};

/* ── FIELD ── */
const Fld=({label,value,onChange,type="text",placeholder=""})=>(
  <div style={{marginBottom:13}}>
    {label&&<label style={{display:"block",fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.9,textTransform:"uppercase",marginBottom:5}}>{label}</label>}
    <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.bgm}`,fontSize:14,
        color:C.tx,background:C.cream,outline:"none",boxSizing:"border-box",WebkitAppearance:"none"}}/>
  </div>
);

/* ── SELECT ── */
const Slct=({label,value,onChange,options})=>(
  <div style={{marginBottom:13}}>
    {label&&<label style={{display:"block",fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.9,textTransform:"uppercase",marginBottom:5}}>{label}</label>}
    <select value={value||""} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.bgm}`,fontSize:14,
        color:C.tx,background:C.cream,outline:"none",boxSizing:"border-box",WebkitAppearance:"none",appearance:"none"}}>
      {options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}
    </select>
  </div>
);

/* ── BOTTOM NAV ── */
const NAV=[{id:"home",l:"Início",n:"home"},{id:"clients",l:"Clientes",n:"users"},
  {id:"agenda",l:"Agenda",n:"cal"},{id:"photos",l:"Fotos",n:"img"},
  {id:"payments",l:"Pgto",n:"wallet"},{id:"fin",l:"Análise",n:"chart"}];

const BNav=({page,setPage})=>(
  <div style={{background:C.wh,borderTop:`1px solid ${C.bg}`,display:"flex",
    paddingBottom:"env(safe-area-inset-bottom,4px)",boxShadow:"0 -3px 16px rgba(60,30,10,.08)",flexShrink:0}}>
    {NAV.map(n=>{
      const a=page===n.id;
      return <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,display:"flex",flexDirection:"column",
        alignItems:"center",gap:2,padding:"8px 2px 4px",border:"none",background:"none",
        color:a?C.br:C.txl,cursor:"pointer"}}>
        <Ic n={n.n} s={20} c={a?C.br:C.txl}/>
        <span style={{fontSize:9,fontWeight:a?700:500}}>{n.l}</span>
        {a&&<div style={{width:4,height:4,borderRadius:"50%",background:C.br,marginTop:1}}/>}
      </button>;
    })}
  </div>
);

/* ════════════ HOME ════════════ */
const Home=({clients,agenda,setPage})=>{
  const today=new Date().toISOString().slice(0,10);
  const totalRec=clients.reduce((s,c)=>s+paidOf(c),0);
  const totalPend=clients.reduce((s,c)=>s+Math.max(0,effVal(c)-paidOf(c)),0);
  const totalCosts=clients.reduce((s,c)=>s+costsOf(c),0);
  const lucro=totalRec-totalCosts;
  const upcoming=agenda.filter(a=>a.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  const alerts=clients.filter(c=>c.pendingPhotos>0||paidOf(c)<effVal(c));
  return (
    <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      {/* Header */}
      <div style={{background:`linear-gradient(160deg,${C.brd},${C.br})`,padding:"28px 20px 22px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <div style={{width:42,height:42,borderRadius:12,background:"rgba(255,255,255,.18)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ic n="cam" s={22} c={C.wh}/>
          </div>
          <div>
            <div style={{fontFamily:"Georgia,serif",fontSize:17,fontWeight:700,color:C.wh}}>Giovana Petronilho</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.7)",letterSpacing:.5}}>FOTOGRAFIA · CAXAMBU MG</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["Recebido",fmt(totalRec),C.wh],["A Receber",fmt(totalPend),C.brxl],["Lucro Líquido",fmt(lucro),lucro>=0?"#A8E6B4":"#F4B8B8"],["Clientes",clients.length,C.wh]].map(([l,v,col])=>(
            <div key={l} style={{background:"rgba(255,255,255,.14)",borderRadius:14,padding:"13px 15px"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,.65)",letterSpacing:.6,textTransform:"uppercase",marginBottom:3}}>{l}</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:col,lineHeight:1}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"18px 16px 100px"}}>
        {/* Próximas sessões */}
        {upcoming.length>0&&(
          <div style={{marginBottom:24}}>
            <div style={{fontSize:11,fontWeight:700,color:C.txm,letterSpacing:.7,textTransform:"uppercase",marginBottom:10}}>Próximas Sessões</div>
            {upcoming.map(a=>{
              const cl=clients.find(c=>c.id===a.clientId);
              const tc=AGCOLOR[a.type]||C.br;
              return <div key={a.id} style={{background:C.wh,borderRadius:14,padding:"13px 16px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 8px rgba(60,30,10,.07)",borderLeft:`3px solid ${tc}`,marginBottom:8}}>
                <div style={{textAlign:"center",minWidth:32}}>
                  <div style={{fontFamily:"Georgia,serif",fontSize:19,fontWeight:800,color:tc,lineHeight:1}}>{new Date(a.date+"T12:00:00").getDate()}</div>
                  <div style={{fontSize:9,color:C.txl,textTransform:"uppercase"}}>{MONTHS[new Date(a.date+"T12:00:00").getMonth()]}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,color:C.tx,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cl?.name||"—"}</div>
                  <div style={{fontSize:11,color:C.txm}}>{a.time} · {a.location}</div>
                </div>
                <span style={{fontSize:10,fontWeight:700,color:tc,background:`${tc}18`,borderRadius:10,padding:"3px 9px",whiteSpace:"nowrap"}}>{a.type}</span>
              </div>;
            })}
          </div>
        )}

        {/* Alertas */}
        {alerts.length>0&&(
          <div>
            <div style={{fontSize:11,fontWeight:700,color:C.txm,letterSpacing:.7,textTransform:"uppercase",marginBottom:10}}>Atenção Necessária</div>
            {alerts.slice(0,5).map(c=>(
              <div key={c.id} style={{background:C.wh,borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 8px rgba(60,30,10,.07)",marginBottom:8}}
                onClick={()=>setPage("clients")}>
                <Av name={c.name} size={36}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,color:C.tx,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                  <div style={{fontSize:11,color:C.txm}}>{c.city} · {c.sessionType}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end"}}>
                  {c.pendingPhotos>0&&<span style={{fontSize:10,color:C.warn,fontWeight:600}}>{c.pendingPhotos} fotos</span>}
                  {paidOf(c)<effVal(c)&&<span style={{fontSize:10,color:C.err,fontWeight:600}}>{fmt(effVal(c)-paidOf(c))}</span>}
                </div>
              </div>
            ))}
          </div>
        )}
        {alerts.length===0&&upcoming.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:C.txm}}>
            <div style={{fontSize:40,marginBottom:12}}>✨</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.tx,marginBottom:6}}>Tudo em dia!</div>
            <div style={{fontSize:13}}>Nenhum alerta pendente.</div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ════════════ CLIENTS ════════════ */
const EMPTY_CLIENT={name:"",city:"",phone:"",email:"",sessionType:"Casamento",weddingServices:[],
  sessionDate:"",totalPhotos:"",totalValue:"",pricePerPhoto:"",paymentMode:"pacote",notes:"",
  costs:[],payments:[],services:[],deliveredPhotos:0,pendingPhotos:0,status:"pendente"};

const Clients=({clients,setClients,agenda})=>{
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("todos");
  const [sheet,setSheet]=useState(null); // null | "new" | client
  const [detail,setDetail]=useState(null);
  const [svcSheet,setSvcSheet]=useState(null); // client for adding service
  const [form,setForm]=useState({});
  const [wSel,setWSel]=useState([]);
  const [svcForm,setSvcForm]=useState({name:"",date:"",notes:""});

  const filtered=useMemo(()=>
    clients.filter(c=>{
      const m=`${c.name||""} ${c.sessionType||""} ${c.city||""}`.toLowerCase().includes(search.toLowerCase());
      return filter==="todos"?m:m&&c.status===filter;
    })
  ,[clients,search,filter]);

  const openNew=()=>{setForm({...EMPTY_CLIENT});setWSel([]);setSheet("new");};
  const openEdit=c=>{setForm({...c,totalPhotos:String(c.totalPhotos||0),totalValue:String(c.totalValue||0),pricePerPhoto:String(c.pricePerPhoto||0)});setWSel(c.weddingServices||[]);setSheet(c);};

  const save=()=>{
    if(!form.name?.trim()){alert("Nome obrigatório");return;}
    const tp=Number(form.totalPhotos)||0;
    const base={...form,totalPhotos:tp,totalValue:Number(form.totalValue)||0,
      pricePerPhoto:Number(form.pricePerPhoto)||0,weddingServices:wSel};
    if(sheet==="new"){
      const nc={...base,id:Date.now(),deliveredPhotos:0,pendingPhotos:tp,status:"pendente",costs:[],payments:[],services:[]};
      setClients(p=>[nc,...p]);
    } else {
      setClients(p=>p.map(c=>c.id===sheet.id?{...c,...base}:c));
      if(detail) setDetail(d=>({...d,...base}));
    }
    setSheet(null);
  };

  const del=id=>{setClients(p=>p.filter(c=>c.id!==id));setDetail(null);};
  const toggleWS=s=>setWSel(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);

  // Add sub-service
  const addService=clientId=>{
    if(!svcForm.name.trim()){alert("Nome do serviço obrigatório");return;}
    const svc={id:Date.now(),...svcForm};
    setClients(p=>p.map(c=>c.id!==clientId?c:{...c,services:[...(c.services||[]),svc]}));
    if(detail?.id===clientId) setDetail(d=>({...d,services:[...(d.services||[]),svc]}));
    setSvcSheet(null);setSvcForm({name:"",date:"",notes:""});
  };
  const delService=(clientId,svcId)=>{
    setClients(p=>p.map(c=>c.id!==clientId?c:{...c,services:(c.services||[]).filter(s=>s.id!==svcId)}));
    if(detail?.id===clientId) setDetail(d=>({...d,services:(d.services||[]).filter(s=>s.id!==svcId)}));
  };

  // Get agenda for client
  const clientAgenda=clientId=>agenda.filter(a=>a.clientId===clientId).sort((a,b)=>a.date.localeCompare(b.date));

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <PH title="Clientes" sub={`${clients.length} cadastradas`} action={<AddB onClick={openNew}/>}/>

      {/* Search + filter */}
      <div style={{padding:"10px 16px 4px",background:C.cream,flexShrink:0}}>
        <div style={{position:"relative",marginBottom:8}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><Ic n="search" s={15} c={C.txl}/></span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome, cidade ou tipo..."
            style={{width:"100%",padding:"9px 14px 9px 36px",borderRadius:10,border:`1.5px solid ${C.bgm}`,
              fontSize:13,color:C.tx,background:C.wh,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none"}}>
          {["todos","pendente","parcial","entregue"].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} style={{flexShrink:0,padding:"5px 14px",borderRadius:20,
              border:`1.5px solid ${filter===f?C.br:C.bgm}`,background:filter===f?C.br:C.wh,
              color:filter===f?C.wh:C.txm,fontSize:11,fontWeight:700,cursor:"pointer"}}>{f}</button>
          ))}
        </div>
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"8px 16px 100px"}}>
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"40px 0",color:C.txm}}>
            <div style={{fontSize:32,marginBottom:8}}>🔍</div>
            <div>Nenhuma cliente encontrada</div>
          </div>
        )}
        {filtered.map(c=>{
          const paid=paidOf(c);const eff=effVal(c);const costs=costsOf(c);const lucro=paid-costs;
          return (
            <div key={c.id} onClick={()=>setDetail(c)}
              style={{background:C.wh,borderRadius:16,padding:"16px",boxShadow:"0 1px 8px rgba(60,30,10,.07)",marginBottom:10,cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                <Av name={c.name}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,color:C.tx,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                  <div style={{fontSize:11,color:C.txm,display:"flex",alignItems:"center",gap:4}}>
                    <Ic n="pin" s={10} c={C.txl}/>{c.city||"—"} · {c.sessionType} · {fmtD(c.sessionDate)}
                  </div>
                  {c.sessionType==="Casamento"&&(c.weddingServices||[]).length>0&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                      {(c.weddingServices||[]).map(s=><span key={s} style={{fontSize:9,background:`${C.pu}18`,color:C.pu,borderRadius:8,padding:"2px 7px",fontWeight:700}}>{s}</span>)}
                    </div>
                  )}
                  {(c.services||[]).length>0&&(
                    <div style={{fontSize:11,color:C.br,marginTop:3}}>+{c.services.length} serviço(s) adicional</div>
                  )}
                </div>
                <Bdg status={c.status}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[["Fotos",`${c.deliveredPhotos}/${c.totalPhotos}`,c.deliveredPhotos,c.totalPhotos,C.br],
                  ["Pago",fmt(paid),paid,eff,paid>=eff?C.ok:C.warn],
                  ["Lucro",fmt(lucro),Math.max(0,lucro),paid||1,lucro>=0?C.ok:C.err]].map(([l,v,val,mx,col])=>(
                  <div key={l} style={{background:C.cream,borderRadius:10,padding:"8px 10px"}}>
                    <div style={{fontSize:9,color:C.txl,textTransform:"uppercase"}}>{l}</div>
                    <div style={{fontWeight:700,color:col,fontSize:12}}>{v}</div>
                    <Bar value={val} max={mx} color={col}/>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Detail Sheet */}
      {detail&&(
        <Sheet title="Detalhes" onClose={()=>setDetail(null)}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
            <Av name={detail.name} size={50}/>
            <div>
              <div style={{fontFamily:"Georgia,serif",fontSize:17,fontWeight:700,color:C.tx}}>{detail.name}</div>
              <div style={{fontSize:12,color:C.txm,display:"flex",alignItems:"center",gap:4}}><Ic n="pin" s={12} c={C.br}/>{detail.city||"—"} · {detail.sessionType}</div>
            </div>
          </div>

          {/* Wedding services badges */}
          {detail.sessionType==="Casamento"&&(detail.weddingServices||[]).length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.7,textTransform:"uppercase",marginBottom:8}}>Serviços do Casamento</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {(detail.weddingServices||[]).map(s=><span key={s} style={{fontSize:12,background:`${C.pu}18`,color:C.pu,borderRadius:10,padding:"5px 12px",fontWeight:600}}>{s}</span>)}
              </div>
            </div>
          )}

          {/* Info grid */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {[["Sessão",fmtD(detail.sessionDate)],["Cobrança",detail.paymentMode==="por_foto"?`R$${detail.pricePerPhoto}/foto`:"Pacote"],
              ["Fotos",`${detail.deliveredPhotos}/${detail.totalPhotos}`],["Contrato",fmt(effVal(detail))],
              ["Pago",fmt(paidOf(detail))],["Custos",fmt(costsOf(detail))],
              ["Saldo",fmt(Math.max(0,effVal(detail)-paidOf(detail)))],["Lucro",fmt(paidOf(detail)-costsOf(detail))]
            ].map(([l,v])=>(
              <div key={l} style={{background:C.cream,borderRadius:10,padding:"9px 12px"}}>
                <div style={{fontSize:9,fontWeight:700,color:C.txl,letterSpacing:.7,textTransform:"uppercase"}}>{l}</div>
                <div style={{fontWeight:700,color:C.tx,fontSize:13,marginTop:2}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Agenda vinculada */}
          {clientAgenda(detail.id).length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.7,textTransform:"uppercase",marginBottom:8}}>Agenda Vinculada</div>
              {clientAgenda(detail.id).map(a=>{
                const tc=AGCOLOR[a.type]||C.br;
                return <div key={a.id} style={{display:"flex",gap:12,padding:"8px 12px",background:C.cream,borderRadius:10,marginBottom:6,borderLeft:`3px solid ${tc}`}}>
                  <div style={{minWidth:50,textAlign:"center"}}>
                    <div style={{fontSize:13,fontWeight:800,color:tc}}>{fmtD(a.date)}</div>
                    <div style={{fontSize:10,color:C.txm}}>{a.time}</div>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:C.tx}}>{a.type}</div>
                    <div style={{fontSize:11,color:C.txm}}>{a.location}</div>
                  </div>
                </div>;
              })}
            </div>
          )}

          {/* Serviços adicionais */}
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.7,textTransform:"uppercase"}}>Serviços Adicionais</div>
              <button onClick={()=>{setSvcForm({name:"",date:"",notes:""});setSvcSheet(detail.id);}}
                style={{background:`${C.br}18`,border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:C.br,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                <Ic n="plus" s={12} c={C.br}/>Adicionar
              </button>
            </div>
            {(detail.services||[]).length===0&&<div style={{fontSize:12,color:C.txl,fontStyle:"italic"}}>Nenhum serviço adicional</div>}
            {(detail.services||[]).map(s=>(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:C.cream,borderRadius:10,marginBottom:6}}>
                <Ic n="tag" s={14} c={C.br}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.tx}}>{s.name}</div>
                  {s.date&&<div style={{fontSize:11,color:C.txm}}>{fmtD(s.date)}</div>}
                  {s.notes&&<div style={{fontSize:11,color:C.txl,fontStyle:"italic"}}>{s.notes}</div>}
                </div>
                <button onClick={()=>delService(detail.id,s.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Ic n="trash" s={14} c={C.err}/></button>
              </div>
            ))}
          </div>

          {/* Notes */}
          {detail.notes&&<div style={{background:C.bg,borderRadius:12,padding:"12px 14px",fontSize:12,color:C.txm,marginBottom:14,fontStyle:"italic"}}>{detail.notes}</div>}

          {/* Contact */}
          {detail.phone&&<a href={`tel:${detail.phone}`} style={{display:"flex",alignItems:"center",gap:8,padding:"11px 16px",background:C.cream,borderRadius:12,marginBottom:6,textDecoration:"none",color:C.tx,fontSize:13,fontWeight:600}}><Ic n="phone" s={15} c={C.br}/>{detail.phone}</a>}
          {detail.email&&<a href={`mailto:${detail.email}`} style={{display:"flex",alignItems:"center",gap:8,padding:"11px 16px",background:C.cream,borderRadius:12,marginBottom:14,textDecoration:"none",color:C.tx,fontSize:13,fontWeight:600}}><Ic n="mail" s={15} c={C.br}/>{detail.email}</a>}

          <div style={{display:"flex",gap:10,marginBottom:8}}>
            <Btn full v="ghost" icon="edit" onClick={()=>{openEdit(detail);setDetail(null);}}>Editar</Btn>
            <Btn full v="danger" icon="trash" onClick={()=>del(detail.id)}>Excluir</Btn>
          </div>
        </Sheet>
      )}

      {/* Add service sheet */}
      {svcSheet&&(
        <Sheet title="Adicionar Serviço" onClose={()=>setSvcSheet(null)}>
          <Fld label="Nome do Serviço" value={svcForm.name} onChange={v=>setSvcForm(f=>({...f,name:v}))} placeholder="Ex: Álbum premium, 2ª cerimônia..."/>
          <Fld label="Data (opcional)" type="date" value={svcForm.date} onChange={v=>setSvcForm(f=>({...f,date:v}))}/>
          <Fld label="Observações" value={svcForm.notes} onChange={v=>setSvcForm(f=>({...f,notes:v}))}/>
          <Btn full onClick={()=>addService(svcSheet)}>Adicionar Serviço</Btn>
        </Sheet>
      )}

      {/* Form sheet */}
      {sheet&&(
        <Sheet title={sheet==="new"?"Nova Cliente":"Editar Cliente"} onClose={()=>setSheet(null)}>
          <Fld label="Nome completo" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))}/>
          <Fld label="Cidade" value={form.city} onChange={v=>setForm(f=>({...f,city:v}))} placeholder="Ex: Caxambu"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Fld label="Telefone" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))}/>
            <Fld label="E-mail" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))}/>
          </div>
          <Slct label="Tipo de Sessão" value={form.sessionType} onChange={v=>setForm(f=>({...f,sessionType:v}))} options={SESSION_TYPES}/>

          {form.sessionType==="Casamento"&&(
            <div style={{marginBottom:13}}>
              <label style={{display:"block",fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.9,textTransform:"uppercase",marginBottom:8}}>Serviços do Casamento</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {WEDDING_SVCS.map(s=>(
                  <button key={s} onClick={()=>toggleWS(s)} style={{padding:"6px 12px",borderRadius:20,
                    border:`1.5px solid ${wSel.includes(s)?C.pu:C.bgm}`,
                    background:wSel.includes(s)?`${C.pu}18`:C.wh,
                    color:wSel.includes(s)?C.pu:C.txm,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                    {wSel.includes(s)?"✓ ":""}{s}
                  </button>
                ))}
              </div>
            </div>
          )}

          <Fld label="Data da Sessão" type="date" value={form.sessionDate} onChange={v=>setForm(f=>({...f,sessionDate:v}))}/>
          <Fld label="Total de Fotos" type="number" value={form.totalPhotos} onChange={v=>setForm(f=>({...f,totalPhotos:v}))}/>

          <div style={{marginBottom:13}}>
            <label style={{display:"block",fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.9,textTransform:"uppercase",marginBottom:8}}>Tipo de Cobrança</label>
            <div style={{display:"flex",gap:10}}>
              {[{v:"pacote",l:"Pacote Fechado"},{v:"por_foto",l:"Por Foto"}].map(m=>(
                <button key={m.v} onClick={()=>setForm(f=>({...f,paymentMode:m.v}))}
                  style={{flex:1,padding:"10px",borderRadius:10,
                    border:`1.5px solid ${form.paymentMode===m.v?C.br:C.bgm}`,
                    background:form.paymentMode===m.v?`${C.br}18`:C.wh,
                    color:form.paymentMode===m.v?C.br:C.txm,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  {m.l}
                </button>
              ))}
            </div>
          </div>

          {form.paymentMode==="pacote"
            ?<Fld label="Valor do Pacote (R$)" type="number" value={form.totalValue} onChange={v=>setForm(f=>({...f,totalValue:v}))}/>
            :<Fld label="Preço por Foto (R$)" type="number" value={form.pricePerPhoto} onChange={v=>setForm(f=>({...f,pricePerPhoto:v}))} placeholder="Ex: 8.00"/>
          }
          <Fld label="Observações" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))}/>
          <div style={{paddingBottom:8}}><Btn full onClick={save}>Salvar Cliente</Btn></div>
        </Sheet>
      )}
    </div>
  );
};

/* ════════════ AGENDA ════════════ */
const Agenda=({agenda,setAgenda,clients})=>{
  const [sheet,setSheet]=useState(false);
  const [form,setForm]=useState({});
  const byDate=useMemo(()=>{
    const m={};
    agenda.forEach(a=>{if(!m[a.date])m[a.date]=[];m[a.date].push(a);});
    return Object.entries(m).sort(([a],[b])=>a.localeCompare(b));
  },[agenda]);
  const save=()=>{
    if(!form.clientId||!form.date){alert("Selecione cliente e data");return;}
    setAgenda(p=>[...p,{...form,id:Date.now(),clientId:Number(form.clientId)}]);
    setSheet(false);
  };
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <PH title="Agenda" sub={`${agenda.length} agendamentos`} action={<AddB onClick={()=>{setForm({clientId:"",date:"",time:"09:00",type:"Casamento",location:"Estúdio GP",status:"confirmado",notes:""});setSheet(true);}}/>}/>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"14px 16px 100px"}}>
        {byDate.length===0&&(
          <div style={{textAlign:"center",padding:"40px 0",color:C.txm}}>
            <div style={{fontSize:32,marginBottom:8}}>📅</div>
            <div>Nenhum agendamento</div>
          </div>
        )}
        {byDate.map(([date,items])=>(
          <div key={date} style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{background:C.br,color:C.wh,borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:700}}>{fmtD(date)}</div>
              <div style={{flex:1,height:1,background:C.bgm}}/>
            </div>
            {items.map(a=>{
              const cl=clients.find(c=>c.id===a.clientId);
              const tc=AGCOLOR[a.type]||C.br;
              return <div key={a.id} style={{background:C.wh,borderRadius:14,padding:"13px 16px",display:"flex",gap:14,boxShadow:"0 1px 8px rgba(60,30,10,.07)",borderLeft:`3px solid ${tc}`,marginBottom:8}}>
                <div style={{textAlign:"center",minWidth:44}}>
                  <div style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:800,color:tc}}>{a.time}</div>
                  <span style={{fontSize:9,fontWeight:700,color:tc,background:`${tc}18`,borderRadius:8,padding:"2px 6px"}}>{a.type}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,color:C.tx,fontSize:13}}>{cl?.name||"Cliente não encontrado"}</div>
                  <div style={{fontSize:11,color:C.txm}}>{cl?.city&&`${cl.city} · `}{a.location}</div>
                  {a.notes&&<div style={{fontSize:11,color:C.txl,marginTop:3,fontStyle:"italic"}}>{a.notes}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
                  <Bdg status={a.status}/>
                  <button onClick={()=>setAgenda(p=>p.filter(x=>x.id!==a.id))} style={{background:"#FAE8E8",border:"none",borderRadius:8,padding:"5px 7px",cursor:"pointer"}}><Ic n="trash" s={13} c={C.err}/></button>
                </div>
              </div>;
            })}
          </div>
        ))}
      </div>
      {sheet&&(
        <Sheet title="Novo Agendamento" onClose={()=>setSheet(false)}>
          <Slct label="Cliente" value={form.clientId} onChange={v=>setForm(f=>({...f,clientId:v}))}
            options={[{value:"",label:"Selecionar cliente..."},...clients.map(c=>({value:c.id,label:`${c.name}${c.city?` · ${c.city}`:""}`}))]}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Fld label="Data" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
            <Fld label="Horário" type="time" value={form.time} onChange={v=>setForm(f=>({...f,time:v}))}/>
          </div>
          <Slct label="Tipo" value={form.type} onChange={v=>setForm(f=>({...f,type:v}))}
            options={["Casamento","Cerimônia","Recepção","Making Off","Newborn","Debutante","Gestante","Família","Aniversário","Estúdio","Externo","Pré-Wedding","Ensaio","Reunião","Entrega"]}/>
          <Fld label="Local" value={form.location} onChange={v=>setForm(f=>({...f,location:v}))}/>
          <Slct label="Status" value={form.status} onChange={v=>setForm(f=>({...f,status:v}))}
            options={[{value:"confirmado",label:"Confirmado"},{value:"pendente",label:"Pendente"},{value:"disponivel",label:"Disponível"}]}/>
          <Fld label="Observações" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))}/>
          <div style={{paddingBottom:8}}><Btn full onClick={save}>Salvar Agendamento</Btn></div>
        </Sheet>
      )}
    </div>
  );
};

/* ════════════ FOTOS ════════════ */
const Photos=({clients,setClients})=>{
  const [sel,setSel]=useState(null);
  const [qty,setQty]=useState("");
  const deliver=id=>{
    const q=Number(qty);if(!q||q<=0){alert("Informe a quantidade");return;}
    setClients(p=>p.map(c=>{
      if(c.id!==id)return c;
      const d=Math.min(c.deliveredPhotos+q,c.totalPhotos);
      const pn=c.totalPhotos-d;
      return{...c,deliveredPhotos:d,pendingPhotos:pn,status:pn===0?"entregue":d>0?"parcial":"pendente"};
    }));
    setSel(null);setQty("");
  };
  const total=clients.reduce((s,c)=>s+c.totalPhotos,0);
  const del=clients.reduce((s,c)=>s+c.deliveredPhotos,0);
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <PH title="Fotos" sub="Controle de entregas"/>
      <div style={{display:"flex",gap:10,padding:"12px 16px 4px",background:C.cream,flexShrink:0}}>
        {[["Total",total,C.br],["Entregues",del,C.ok],["Pendentes",total-del,C.warn]].map(([l,v,col])=>(
          <div key={l} style={{background:C.wh,borderRadius:12,padding:"10px 14px",flex:1,boxShadow:"0 1px 6px rgba(60,30,10,.06)"}}>
            <div style={{fontSize:9,fontWeight:700,color:C.txl,letterSpacing:.6,textTransform:"uppercase",marginBottom:2}}>{l}</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:20,fontWeight:700,color:col}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"8px 16px 100px"}}>
        {clients.map(c=>{
          const pct=c.totalPhotos?Math.round(c.deliveredPhotos/c.totalPhotos*100):0;
          return (
            <div key={c.id} style={{background:C.wh,borderRadius:16,padding:"16px",boxShadow:"0 1px 8px rgba(60,30,10,.07)",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <Av name={c.name}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,color:C.tx,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                  <div style={{fontSize:11,color:C.txm}}>{c.city} · {c.sessionType}{c.paymentMode==="por_foto"?` · R$${c.pricePerPhoto}/foto`:""}</div>
                </div>
                <Bdg status={c.status}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
                {[["Contrat.",c.totalPhotos,C.tx],["Entregues",c.deliveredPhotos,C.ok],["Pendentes",c.pendingPhotos,C.warn]].map(([l,v,col])=>(
                  <div key={l} style={{background:C.cream,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:C.txl,textTransform:"uppercase"}}>{l}</div>
                    <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:col}}>{v}</div>
                  </div>
                ))}
              </div>
              {c.paymentMode==="por_foto"&&c.deliveredPhotos>0&&(
                <div style={{background:`${C.ok}18`,borderRadius:10,padding:"8px 12px",marginBottom:10,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:12,color:C.txm}}>Valor gerado</span>
                  <span style={{fontSize:13,fontWeight:700,color:C.ok}}>{fmt(c.deliveredPhotos*(c.pricePerPhoto||0))}</span>
                </div>
              )}
              <div style={{marginBottom:c.pendingPhotos>0?10:0}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:10,color:C.txl}}>Progresso</span>

                </div>
                <Bar value={c.deliveredPhotos} max={c.totalPhotos}/>

            </div>
          );
        })}
      </div>
      {sel&&(
        <Sheet title="Registrar Entrega" onClose={()=>setSel(null)}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
            <Av name={sel.name}/>
            <div>
              <div style={{fontWeight:700,color:C.tx}}>{sel.name}</div>
              <div style={{fontSize:12,color:C.txm}}>{sel.pendingPhotos} fotos pendentes{sel.paymentMode==="por_foto"?` · R$${sel.pricePerPhoto}/foto`:""}</div>

/* ════════════ PAGAMENTOS ════════════ */
const Payments=({clients,setClients})=>{
  const [selPay,setSelPay]=useState(null);
  const [selCost,setSelCost]=useState(null);
  const [payF,setPayF]=useState({value:"",date:"",note:""});
  const [costF,setCostF]=useState({cat:"Deslocamento",desc:"",value:""});

  const addPayment=id=>{
    const v=Number(payF.value);if(!v){alert("Informe o valor");return;}
    const client=clients.find(c=>c.id===id);
    const eff=effVal(client);const cur=paidOf(client);
    const np={id:Date.now(),value:Math.min(v,Math.max(0,eff-cur)||v),date:payF.date||new Date().toISOString().slice(0,10),note:payF.note||"Pagamento"};
    setClients(p=>p.map(c=>{
      if(c.id!==id)return c;
      const ps=[...(c.payments||[]),np];
      const tot=ps.reduce((s,x)=>s+x.value,0);
      return{...c,payments:ps,status:tot>=effVal(c)?"entregue":tot>0?"parcial":c.status};
    }));
    setSelPay(null);setPayF({value:"",date:"",note:""});
  };
  const delPayment=(cId,pId)=>setClients(p=>p.map(c=>c.id!==cId?c:{...c,payments:(c.payments||[]).filter(x=>x.id!==pId)}));
  const addCost=id=>{
    const v=Number(costF.value);if(!v||!costF.desc.trim()){alert("Preencha descrição e valor");return;}
    setClients(p=>p.map(c=>c.id!==id?c:{...c,costs:[...(c.costs||[]),{id:Date.now(),...costF,value:v}]}));
    setSelCost(null);setCostF({cat:"Deslocamento",desc:"",value:""});
  };
  const delCost=(cId,xId)=>setClients(p=>p.map(c=>c.id!==cId?c:{...c,costs:(c.costs||[]).filter(x=>x.id!==xId)}));

  const totalC=clients.reduce((s,c)=>s+effVal(c),0);
  const totalR=clients.reduce((s,c)=>s+paidOf(c),0);
  const totalCosts=clients.reduce((s,c)=>s+costsOf(c),0);
  const lucroG=totalR-totalCosts;

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <PH title="Pagamentos" sub="Parcelas, recebimentos e custos"/>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"14px 16px 100px"}}>
        {/* Hero */}
        <div style={{background:`linear-gradient(135deg,${C.brd},${C.br})`,borderRadius:18,padding:"18px 20px",marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[["Contratos",fmt(totalC),C.wh],["Recebido",fmt(totalR),C.wh],["Custos",fmt(totalCosts),"#F4B8B8"],["Lucro Líq.",fmt(lucroG),lucroG>=0?"#A8E6B4":"#F4B8B8"]].map(([l,v,col])=>(
              <div key={l}><div style={{fontSize:9,color:"rgba(255,255,255,.65)",textTransform:"uppercase",letterSpacing:.6,marginBottom:2}}>{l}</div><div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:col}}>{v}</div></div>
            ))}
          </div>
          <div style={{background:"rgba(255,255,255,.2)",borderRadius:6,height:6,overflow:"hidden"}}>
            <div style={{width:`${totalC?Math.round(totalR/totalC*100):0}%`,height:"100%",background:C.wh,borderRadius:6}}/>
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,.6)",marginTop:4,textAlign:"right"}}>{totalC?Math.round(totalR/totalC*100):0}% recebido</div>
        </div>

        {clients.map(c=>{
          const paid=paidOf(c);const eff=effVal(c);const costs=costsOf(c);
          const pend=Math.max(0,eff-paid);const lucro=paid-costs;const quitado=pend<=0&&eff>0;
          return (
            <div key={c.id} style={{background:C.wh,borderRadius:16,overflow:"hidden",boxShadow:"0 1px 8px rgba(60,30,10,.07)",marginBottom:12}}>
              {/* header */}
              <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.bg}`}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <Av name={c.name}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,color:C.tx,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                    <div style={{fontSize:11,color:C.txm}}>{c.city} · {c.sessionType} · {c.paymentMode==="por_foto"?`R$${c.pricePerPhoto}/foto`:"Pacote"}</div>
                    {c.sessionType==="Casamento"&&(c.weddingServices||[]).length>0&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:3}}>
                        {(c.weddingServices||[]).map(s=><span key={s} style={{fontSize:9,background:`${C.pu}18`,color:C.pu,borderRadius:8,padding:"2px 7px",fontWeight:700}}>{s}</span>)}
                      </div>
                    )}
                  </div>
                  {quitado?<Bdg status="quitado"/>:<Bdg status="pendente"/>}
                </div>
              </div>

              {/* grid */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:C.bg}}>
                {[["Total",fmt(eff),C.tx],["Pago",fmt(paid),quitado?C.ok:C.warn],["Custos",fmt(costs),C.err]].map(([l,v,col])=>(
                  <div key={l} style={{background:C.wh,padding:"10px 12px"}}>
                    <div style={{fontSize:9,color:C.txl,textTransform:"uppercase",letterSpacing:.4}}>{l}</div>
                    <div style={{fontWeight:700,color:col,fontSize:13}}>{v}</div>
                  </div>
                ))}
              </div>

              {/* lucro */}
              <div style={{padding:"9px 14px",background:lucro>=0?"#E5F4E9":"#FAE8E8"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:11,fontWeight:700,color:C.txm}}>Lucro Líquido</span>
                  <span style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:lucro>=0?C.ok:C.err}}>{fmt(lucro)}</span>
                </div>
              </div>

              {/* parcelas */}
              {(c.payments||[]).length>0&&(
                <div style={{padding:"10px 14px",borderTop:`1px solid ${C.bg}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.6,textTransform:"uppercase",marginBottom:8}}>Parcelas Registradas</div>
                  {(c.payments||[]).map((pay,i)=>(
                    <div key={pay.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${C.bg}`}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:C.ok,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <span style={{fontSize:10,color:C.wh,fontWeight:700}}>{i+1}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,color:C.tx}}>{pay.note||"Pagamento"}</div>
                        <div style={{fontSize:10,color:C.txm}}>{fmtD(pay.date)}</div>
                      </div>
                      <span style={{fontSize:13,fontWeight:700,color:C.ok,flexShrink:0}}>{fmt(pay.value)}</span>
                      <button onClick={()=>delPayment(c.id,pay.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4,flexShrink:0}}><Ic n="trash" s={13} c={C.err}/></button>
                    </div>
                  ))}
                  {!quitado&&<div style={{display:"flex",justifyContent:"space-between",padding:"7px 0 0",fontSize:12}}>
                    <span style={{color:C.txm}}>Saldo restante</span>
                    <span style={{fontWeight:700,color:C.warn}}>{fmt(pend)}</span>
                  </div>}
                </div>
              )}

              {/* custos */}
              {(c.costs||[]).length>0&&(
                <div style={{padding:"10px 14px",borderTop:`1px solid ${C.bg}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.6,textTransform:"uppercase",marginBottom:8}}>Custos do Ensaio</div>
                  {(c.costs||[]).map(cost=>(
                    <div key={cost.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:`1px solid ${C.bg}`}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:C.err,flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontSize:12,fontWeight:600,color:C.tx}}>{cost.cat}</span>
                        <span style={{fontSize:11,color:C.txm}}> · {cost.desc}</span>
                      </div>
                      <span style={{fontSize:12,fontWeight:700,color:C.err,flexShrink:0}}>{fmt(cost.value)}</span>
                      <button onClick={()=>delCost(c.id,cost.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4,flexShrink:0}}><Ic n="trash" s={13} c={C.err}/></button>
                    </div>
                  ))}
                </div>
              )}

              {/* actions */}
              <div style={{display:"flex",gap:8,padding:"12px 14px"}}>
                <Btn full sm icon="tag" v="soft" onClick={()=>{setSelCost(c);setCostF({cat:"Deslocamento",desc:"",value:""});}}>+ Custo</Btn>
                {!quitado&&<Btn full sm icon="money" onClick={()=>{setSelPay(c);setPayF({value:"",date:"",note:""});}}>+ Parcela</Btn>}
              </div>
            </div>
          );
        })}
      </div>

      {selPay&&(
        <Sheet title={`Nova Parcela`} onClose={()=>setSelPay(null)}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <Av name={selPay.name}/>
            <div>
              <div style={{fontWeight:700,color:C.tx}}>{selPay.name}</div>
              <div style={{fontSize:12,color:C.txm}}>Saldo: {fmt(Math.max(0,effVal(selPay)-paidOf(selPay)))}</div>
            </div>
          </div>
          <div style={{background:C.bg,borderRadius:12,padding:"12px 14px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:C.txm}}>Total contrato</span><span style={{fontWeight:700}}>{fmt(effVal(selPay))}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:C.txm}}>Já pago</span><span style={{fontWeight:700,color:C.ok}}>{fmt(paidOf(selPay))}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:C.txm}}>Restante</span><span style={{fontWeight:700,color:C.warn}}>{fmt(Math.max(0,effVal(selPay)-paidOf(selPay)))}</span></div>
          </div>
          <Fld label="Valor recebido (R$)" type="number" value={payF.value} onChange={v=>setPayF(f=>({...f,value:v}))} placeholder="0,00"/>
          <Fld label="Data do pagamento" type="date" value={payF.date} onChange={v=>setPayF(f=>({...f,date:v}))}/>
          <Fld label="Descrição (ex: Sinal 50%)" value={payF.note} onChange={v=>setPayF(f=>({...f,note:v}))} placeholder="Ex: Sinal, Parcela 2, Restante..."/>
          <div style={{paddingBottom:8}}><Btn full onClick={()=>addPayment(selPay.id)}>Confirmar Parcela</Btn></div>
        </Sheet>
      )}

      {selCost&&(
        <Sheet title={`Adicionar Custo`} onClose={()=>setSelCost(null)}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><Av name={selCost.name}/><div><div style={{fontWeight:700,color:C.tx}}>{selCost.name}</div><div style={{fontSize:12,color:C.txm}}>{selCost.sessionType}</div></div></div>
          <Slct label="Categoria" value={costF.cat} onChange={v=>setCostF(f=>({...f,cat:v}))} options={COST_CATS}/>
          <Fld label="Descrição" value={costF.desc} onChange={v=>setCostF(f=>({...f,desc:v}))} placeholder="Ex: Haras Boa Vista 40km"/>
          <Fld label="Valor (R$)" type="number" value={costF.value} onChange={v=>setCostF(f=>({...f,value:v}))} placeholder="0,00"/>
          <div style={{paddingBottom:8}}><Btn full onClick={()=>addCost(selCost.id)}>Adicionar Custo</Btn></div>
        </Sheet>
      )}
    </div>
  );
};

/* ════════════ FINANCEIRO ════════════ */
const Fin=({clients})=>{
  const allMonths=useMemo(()=>{const s=new Set();clients.forEach(c=>{if(c.sessionDate)s.add(c.sessionDate.slice(0,7));});return[...s].sort().reverse();},[clients]);
  const [selM,setSelM]=useState("todos");
  const [selT,setSelT]=useState("todos");

  const filtered=useMemo(()=>clients.filter(c=>{
    const mOk=selM==="todos"||c.sessionDate?.slice(0,7)===selM;
    const tOk=selT==="todos"||c.sessionType===selT;
    return mOk&&tOk;
  }),[clients,selM,selT]);

  const totR=filtered.reduce((s,c)=>s+paidOf(c),0);
  const totC=filtered.reduce((s,c)=>s+costsOf(c),0);
  const totE=filtered.reduce((s,c)=>s+effVal(c),0);
  const totL=totR-totC;
  const totP=Math.max(0,totE-totR);

  const byType=useMemo(()=>{
    const m={};
    filtered.forEach(c=>{const t=c.sessionType||"Outro";if(!m[t])m[t]={r:0,c:0,n:0};m[t].r+=paidOf(c);m[t].c+=costsOf(c);m[t].n++;});
    return Object.entries(m).map(([t,d])=>({t,...d,l:d.r-d.c})).sort((a,b)=>b.r-a.r);
  },[filtered]);

  const byMonth=useMemo(()=>{
    const m={};
    clients.forEach(c=>{const mo=c.sessionDate?.slice(0,7);if(!mo)return;if(!m[mo])m[mo]={r:0,c:0,n:0};m[mo].r+=paidOf(c);m[mo].c+=costsOf(c);m[mo].n++;});
    return Object.entries(m).map(([mo,d])=>({mo,...d,l:d.r-d.c})).sort((a,b)=>a.mo.localeCompare(b.mo));
  },[clients]);

  const byCat=useMemo(()=>{const m={};filtered.forEach(c=>(c.costs||[]).forEach(x=>{m[x.cat]=(m[x.cat]||0)+x.value;}));return Object.entries(m).sort(([,a],[,b])=>b-a);},[filtered]);
  const maxR=Math.max(...byType.map(r=>r.r),1);
  const maxMR=Math.max(...byMonth.map(r=>r.r),1);

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <PH title="Análise Financeira" sub="Receitas, custos e lucro"/>
      <div style={{background:C.cream,padding:"10px 16px 4px",flexShrink:0}}>
        <div style={{fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>Período</div>
        <div style={{display:"flex",gap:8,overflowX:"auto",scrollbarWidth:"none",paddingBottom:6}}>
          {["todos",...allMonths].map(m=>(
            <button key={m} onClick={()=>setSelM(m)} style={{flexShrink:0,padding:"5px 13px",borderRadius:20,border:`1.5px solid ${selM===m?C.br:C.bgm}`,background:selM===m?C.br:C.wh,color:selM===m?C.wh:C.txm,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{m==="todos"?"Todos":mLabel(m)}</button>
          ))}
        </div>
        <div style={{fontSize:10,fontWeight:700,color:C.txm,letterSpacing:.8,textTransform:"uppercase",marginBottom:6,marginTop:4}}>Tipo</div>
        <div style={{display:"flex",gap:8,overflowX:"auto",scrollbarWidth:"none",paddingBottom:6}}>
          {["todos",...SESSION_TYPES].map(t=>(
            <button key={t} onClick={()=>setSelT(t)} style={{flexShrink:0,padding:"5px 13px",borderRadius:20,border:`1.5px solid ${selT===t?(TCOLOR[t]||C.br):C.bgm}`,background:selT===t?(TCOLOR[t]||C.br):C.wh,color:selT===t?C.wh:C.txm,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{t==="todos"?"Todos":t}</button>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"10px 16px 100px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {[["Receita",fmt(totR),C.ok],["Custos",fmt(totC),C.err],["Lucro Líq.",fmt(totL),totL>=0?C.ok:C.err],["A Receber",fmt(totP),C.warn]].map(([l,v,col])=>(
            <div key={l} style={{background:C.wh,borderRadius:14,padding:"13px 15px",boxShadow:"0 1px 8px rgba(60,30,10,.07)"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.txl,letterSpacing:.7,textTransform:"uppercase",marginBottom:3}}>{l}</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:col}}>{v}</div>
            </div>
          ))}
        </div>

        {byType.length>0&&(
          <div style={{background:C.wh,borderRadius:16,padding:"16px",boxShadow:"0 1px 8px rgba(60,30,10,.07)",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.txm,letterSpacing:.6,textTransform:"uppercase",marginBottom:14}}>Por Tipo de Ensaio</div>
            {byType.map(row=>{
              const col=TCOLOR[row.t]||C.br;
              return <div key={row.t} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:col,flexShrink:0}}/>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:C.tx}}>{row.t}</div>
                      <div style={{fontSize:10,color:C.txm}}>{row.n} sessão(ões) · custos {fmt(row.c)}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"Georgia,serif",fontSize:15,fontWeight:700,color:col}}>{fmt(row.r)}</div>
                    <div style={{fontSize:10,color:row.l>=0?C.ok:C.err,fontWeight:600}}>lucro {fmt(row.l)}</div>
                  </div>
                </div>
                <div style={{background:C.bg,borderRadius:6,height:8,overflow:"hidden"}}>
                  <div style={{width:`${Math.round(row.r/maxR*100)}%`,height:"100%",background:col,borderRadius:6}}/>
                </div>
              </div>;
            })}
          </div>
        )}

        {byMonth.length>0&&(
          <div style={{background:C.wh,borderRadius:16,padding:"16px",boxShadow:"0 1px 8px rgba(60,30,10,.07)",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.txm,letterSpacing:.6,textTransform:"uppercase",marginBottom:14}}>Evolução Mensal</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80,marginBottom:8}}>
              {byMonth.map(row=>{
                const hR=Math.round(row.r/maxMR*76);
                const hC=Math.round(row.c/maxMR*76);
                const mo=parseInt(row.mo.split("-")[1])-1;
                return <div key={row.mo} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                  <div style={{width:"100%",display:"flex",gap:1,alignItems:"flex-end",height:76}}>
                    <div style={{flex:1,height:Math.max(3,hR),background:C.br,borderRadius:"2px 2px 0 0"}}/>
                    <div style={{flex:1,height:Math.max(2,hC),background:`${C.err}88`,borderRadius:"2px 2px 0 0"}}/>
                  </div>
                  <div style={{fontSize:7,color:C.txl,textAlign:"center"}}>{MONTHS[mo]}</div>
                </div>;
              })}
            </div>
            <div style={{display:"flex",gap:12,marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:C.br}}/><span style={{fontSize:10,color:C.txm}}>Receita</span></div>
              <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:`${C.err}88`}}/><span style={{fontSize:10,color:C.txm}}>Custos</span></div>
            </div>
            {byMonth.map(row=>(
              <div key={row.mo} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:C.cream,borderRadius:10,marginBottom:5}}>
                <div style={{fontSize:12,fontWeight:700,color:C.tx}}>{mLabel(row.mo)}</div>
                <div style={{display:"flex",gap:10}}>
                  <span style={{fontSize:11,color:C.ok,fontWeight:600}}>{fmt(row.r)}</span>
                  <span style={{fontSize:11,color:C.err,fontWeight:600}}>-{fmt(row.c)}</span>
                  <span style={{fontSize:11,color:row.l>=0?C.br:C.err,fontWeight:700}}>{fmt(row.l)}</span>
                </div>
              </div>
            ))}
          </div>
        )}

        {byCat.length>0&&(
          <div style={{background:C.wh,borderRadius:16,padding:"16px",boxShadow:"0 1px 8px rgba(60,30,10,.07)",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:C.txm,letterSpacing:.6,textTransform:"uppercase",marginBottom:12}}>Gastos por Categoria</div>
            {byCat.map(([cat,val])=>(
              <div key={cat} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 10px",background:C.cream,borderRadius:10,marginBottom:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:C.err,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,color:C.tx,fontWeight:600}}>{cat}</span>
                <span style={{fontSize:13,fontWeight:700,color:C.err}}>{fmt(val)}</span>
                <span style={{fontSize:10,color:C.txl}}>{totC?Math.round(val/totC*100):0}%</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",padding:"9px 10px",borderTop:`1px solid ${C.bgm}`,marginTop:4}}>
              <span style={{fontSize:12,fontWeight:700,color:C.txm}}>Total</span>
              <span style={{fontSize:14,fontWeight:700,color:C.err}}>{fmt(totC)}</span>
            </div>
          </div>
        )}

        {filtered.length>0&&(
          <div style={{background:C.wh,borderRadius:16,padding:"16px",boxShadow:"0 1px 8px rgba(60,30,10,.07)"}}>
            <div style={{fontSize:11,fontWeight:700,color:C.txm,letterSpacing:.6,textTransform:"uppercase",marginBottom:12}}>Ranking · Lucro Líquido</div>
            {[...filtered].map(c=>({...c,ll:paidOf(c)-costsOf(c)})).sort((a,b)=>b.ll-a.ll).map((c,i)=>(
              <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.bg}`}}>
                <div style={{width:20,textAlign:"center",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,color:i<3?C.br:C.txl}}>#{i+1}</div>
                <Av name={c.name} size={32}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                  <div style={{fontSize:10,color:C.txm}}>{c.city} · {c.sessionType}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:13,fontWeight:700,color:c.ll>=0?C.ok:C.err}}>{fmt(c.ll)}</div>
                  <div style={{fontSize:9,color:C.txl}}>{(c.payments||[]).length} parcela(s)</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

/* ════════════ ROOT ════════════ */
function App(){
  const [clients,setClientsRaw]=useState(()=>load(SK.cl,SEED_CL));
  const [agenda,setAgendaRaw]=useState(()=>load(SK.ag,SEED_AG));
  const [page,setPage]=useState("home");

  const setClients=useCallback(u=>{setClientsRaw(p=>{const n=typeof u==="function"?u(p):u;save(SK.cl,n);return n;});},[]);
  const setAgenda=useCallback(u=>{setAgendaRaw(p=>{const n=typeof u==="function"?u(p):u;save(SK.ag,n);return n;});},[]);

  return (
    <div style={{maxWidth:430,margin:"0 auto",height:"100%",display:"flex",flexDirection:"column",background:C.cream}}>
      {page==="home"    &&<Home     clients={clients} agenda={agenda} setPage={setPage}/>}
      {page==="clients" &&<Clients  clients={clients} setClients={setClients} agenda={agenda}/>}
      {page==="agenda"  &&<Agenda   agenda={agenda}   setAgenda={setAgenda}   clients={clients}/>}
      {page==="photos"  &&<Photos   clients={clients} setClients={setClients}/>}
      {page==="payments"&&<Payments clients={clients} setClients={setClients}/>}
      {page==="fin"     &&<Fin      clients={clients}/>}
      <BNav page={page} setPage={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
window.addEventListener('load',()=>{
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=window.navigator.standalone||window.matchMedia('(display-mode:standalone)').matches;
  if(isIOS&&!standalone&&!localStorage.getItem('gp_ios_banner')){
    const d=document.createElement('div');
    d.style.cssText='position:fixed;bottom:74px;left:50%;transform:translateX(-50%);width:calc(100%-32px);max-width:390px;background:#7A5535;color:#fff;border-radius:16px;padding:13px 16px;font-size:13px;font-family:system-ui;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.3);display:flex;gap:12px;align-items:center';
    d.innerHTML='<div style="font-size:22px">📲</div><div style="flex:1"><b>Instalar no iPhone</b><br>Safari → Compartilhar → <b>Adicionar à Tela de Início</b></div><button onclick="this.parentNode.remove();localStorage.setItem(\'gp_ios_banner\',1)" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:5px 9px;cursor:pointer;font-weight:700">✕</button>';
    document.body.appendChild(d);setTimeout(()=>d.remove(),9000);
  }
});
</script>
